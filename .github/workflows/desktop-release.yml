name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            agy-studio/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm ci
        working-directory: agy-studio

      - name: Build desktop installer
        run: npm run dist
        working-directory: agy-studio
        env:
          AGY_AUTO_UPDATE_URL: ${{ secrets.AGY_AUTO_UPDATE_URL }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agy-studio-windows
          path: |
            agy-studio/release/*.exe
            agy-studio/release/*.blockmap


