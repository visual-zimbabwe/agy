    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe2" />
      <stop offset="100%" stop-color="#eadbc3" />
    </linearGradient>
  </defs>
  <rect width="664" height="1016" rx="28" fill="url(#bg)" />
  <rect x="32" y="32" width="600" height="952" rx="24" fill="#fffaf2" stroke="#d6c4a6" stroke-width="4" />
  <rect x="72" y="96" width="520" height="120" rx="14" fill="#241b12" />
  <text x="332" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" font-weight="700" fill="#fffaf2">
