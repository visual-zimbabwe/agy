  <rect x="96" y="290" width="472" height="420" rx="18" fill="#efe3d0" stroke="#d6c4a6" stroke-dasharray="18 14" stroke-width="6" />
  <path d="M232 556h200M232 610h200" stroke="#b08f5a" stroke-linecap="round" stroke-width="18" />
  <circle cx="332" cy="454" r="76" fill="#d6c4a6" />
