<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agy Decks - Study Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#58423c",
              "on-surface": "#1c1c19",
              "surface-variant": "#e5e2dd",
              "on-secondary": "#ffffff",
              "surface-dim": "#dcdad5",
              "primary-fixed-dim": "#ffb5a0",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#ffdbd1",
              "primary-container": "#c44f2e",
              "on-secondary-fixed": "#0b1f15",
              "tertiary-fixed": "#ffdea5",
              "outline": "#8b716a",
              "surface-tint": "#a63a1a",
              "secondary-fixed-dim": "#b4ccbc",
              "inverse-primary": "#ffb5a0",
              "secondary": "#4d6356",
              "primary": "#a33818",
              "on-tertiary-fixed": "#261900",
              "surface-bright": "#fcf9f4",
              "outline-variant": "#dfc0b8",
              "on-secondary-fixed-variant": "#364b3f",
              "inverse-on-surface": "#f3f0eb",
              "on-primary-fixed-variant": "#862303",
              "secondary-fixed": "#d0e8d7",
              "surface-container-high": "#ebe8e3",
              "on-primary-container": "#fffbff",
              "on-error-container": "#93000a",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "on-background": "#1c1c19",
              "background": "#fcf9f4",
              "tertiary-container": "#90702e",
              "secondary-container": "#cde6d5",
              "on-tertiary-fixed-variant": "#5d4201",
              "on-primary-fixed": "#3b0900",
              "tertiary": "#755717",
              "surface-container": "#f0ede8",
              "on-secondary-container": "#52685a",
              "tertiary-fixed-dim": "#e9c176",
              "surface-container-highest": "#e5e2dd",
              "on-error": "#ffffff",
              "surface-container-low": "#f6f3ee",
              "surface": "#fcf9f4",
              "on-tertiary-container": "#fffbff",
              "inverse-surface": "#31302d",
              "error-container": "#ffdad6",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Newsreader"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .grain-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .vellum-effect {
            backdrop-filter: blur(20px);
            background: rgba(252, 249, 244, 0.8);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed relative min-h-screen overflow-hidden">
<div class="fixed inset-0 grain-overlay z-[60]"></div>
<!-- TopAppBar (Based on Shared Components JSON) -->
<header class="fixed top-0 w-full flex justify-between items-center px-8 h-16 bg-[#fcf9f4]/80 backdrop-blur-xl border-b border-[#1c1c19]/10 z-50">
<div class="flex items-center gap-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="close">close</span>
<span class="font-headline font-bold text-primary text-xl">Physiology</span>
</div>
<!-- Session Progress Bar (Muted Gold) -->
<div class="hidden md:flex items-center gap-3 w-64">
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-tertiary w-3/4 rounded-full"></div>
</div>
<span class="font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">75%</span>
</div>
</div>
<nav class="hidden md:flex gap-8 items-center">
<a class="text-[#a33818] border-b-2 border-[#a33818] pb-1 font-['Manrope'] font-bold hover:text-[#a33818] transition-colors" href="#">Study</a>
<a class="text-[#1c1c19]/60 font-['Manrope'] hover:text-[#a33818] transition-colors" href="#">Stats</a>
<a class="text-[#1c1c19]/60 font-['Manrope'] hover:text-[#a33818] transition-colors" href="#">Browse</a>
</nav>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" data-icon="settings">settings</button>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" data-icon="account_circle">account_circle</button>
</div>
</header>
<main class="relative h-screen flex items-center justify-center px-6 pt-16 pb-32">
<!-- Soft Environmental Glow -->
<div class="absolute inset-0 bg-surface-tint opacity-[0.03] pointer-events-none"></div>
<div class="w-full max-w-2xl flex flex-col items-center">
<!-- Center Stage: tactile "Study Card" -->
<div class="group perspective-1000 w-full aspect-[4/3] max-h-[500px]">
<div class="relative w-full h-full transition-all duration-700 transform-gpu bg-surface-container-lowest rounded-xl shadow-[0_10px_30px_rgba(28,28,25,0.06)] border border-outline-variant/10 p-12 flex flex-col justify-center items-center text-center">
<!-- Card Content (Front State - Revealed Logic via Layout) -->
<div class="space-y-8 max-w-md">
<header>
<span class="font-label text-[10px] tracking-[0.2rem] text-tertiary font-bold uppercase mb-4 block">Question</span>
<h1 class="font-headline italic text-3xl md:text-4xl text-on-surface leading-tight tracking-tight">
                                Mechanism of Action: SGLT2 Inhibitors.
                            </h1>
</header>
<!-- Visual Divider (Implicit) -->
<div class="h-px w-12 bg-outline-variant/20 mx-auto"></div>
<!-- Card Content (Back State - Shown here as part of the cinematic view) -->
<div class="animate-in fade-in slide-in-from-bottom-4 duration-1000">
<span class="font-label text-[10px] tracking-[0.2rem] text-secondary font-bold uppercase mb-4 block">Answer</span>
<p class="font-body text-lg md:text-xl text-on-surface-variant leading-relaxed">
                                Reduces renal glucose reabsorption in the proximal convoluted tubule, leading to urinary glucose excretion.
                            </p>
</div>
</div>
<!-- Ambient Decoration (Subtle Ink-like accent) -->
<div class="absolute bottom-6 right-8 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="history_edu">history_edu</span>
</div>
</div>
</div>
<!-- Mini Session Stats Footer -->
<div class="mt-8 flex gap-8 items-center bg-surface-container-low px-6 py-2 rounded-full">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-blue-500"></span>
<span class="font-label text-[11px] font-bold text-on-surface-variant">12 NEW</span>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="font-label text-[11px] font-bold text-on-surface-variant">4 LEARN</span>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="font-label text-[11px] font-bold text-on-surface-variant">86 DUE</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Study Controls from Shared Components JSON) -->
<nav class="fixed bottom-0 w-full max-w-2xl left-1/2 -translate-x-1/2 mb-6 px-12 py-4 flex justify-around items-center bg-[#fcf9f4]/90 backdrop-blur-md rounded-full shadow-[0_-10px_30px_rgba(28,28,25,0.06)] z-50">
<!-- Rating Button: Again -->
<button class="group flex flex-col items-center text-[#1c1c19]/50 hover:bg-[#1c1c19]/5 px-4 py-2 rounded-full transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="replay">replay</span>
<span class="font-label font-bold text-[10px] tracking-widest uppercase">Again</span>
<span class="text-[9px] font-bold text-primary/60 mt-0.5">10M</span>
</button>
<!-- Rating Button: Hard -->
<button class="group flex flex-col items-center text-[#1c1c19]/50 hover:bg-[#1c1c19]/5 px-4 py-2 rounded-full transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="priority_high">priority_high</span>
<span class="font-label font-bold text-[10px] tracking-widest uppercase">Hard</span>
<span class="text-[9px] font-bold text-on-surface-variant/60 mt-0.5">2D</span>
</button>
<!-- Rating Button: Good (Active State Logic applied) -->
<button class="group flex flex-col items-center text-[#a33818] bg-primary/5 px-6 py-2 rounded-full transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="sentiment_satisfied" style="font-variation-settings: 'FILL' 1;">sentiment_satisfied</span>
<span class="font-label font-bold text-[10px] tracking-widest uppercase">Good</span>
<span class="text-[9px] font-bold text-primary mt-0.5">4D</span>
</button>
<!-- Rating Button: Easy -->
<button class="group flex flex-col items-center text-[#1c1c19]/50 hover:bg-[#1c1c19]/5 px-4 py-2 rounded-full transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="star">star</span>
<span class="font-label font-bold text-[10px] tracking-widest uppercase">Easy</span>
<span class="text-[9px] font-bold text-on-surface-variant/60 mt-0.5">7D</span>
</button>
</nav>
<!-- Side Decoration (Digital Atelier Feel) -->
<div class="fixed left-8 top-1/2 -translate-y-1/2 hidden lg:flex flex-col gap-12 opacity-20">
<div class="vertical-text font-label text-[10px] tracking-[0.5rem] uppercase text-on-surface rotate-180" style="writing-mode: vertical-rl;">
            Spatial Learning Environment
        </div>
<div class="h-32 w-px bg-on-surface/20 mx-auto"></div>
</div>
</body></html>
